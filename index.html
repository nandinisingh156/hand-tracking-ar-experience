<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking AR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        .video-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
        }

        .input_video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 0;
            filter: brightness(0.6) contrast(1.1);
        }

        #mainCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 5;
            pointer-events: none;
        }

        #hud {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .panel {
            background: rgba(20, 25, 40, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            min-width: 180px;
        }
        .stat:last-child { margin-bottom: 0; }
        .stat span.val { font-weight: bold; color: #fff; }

        #startOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
        }

        .start-btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: background 0.2s, transform 0.2s;
        }
        .start-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1 style="margin-bottom: 20px; font-weight: 300; letter-spacing: 4px;">HAND TRACKING AR</h1>
        <p style="margin-bottom: 40px; color: #888;">Grant camera permissions and click to start</p>
        <button class="start-btn" id="startBtn">Enter Experience</button>
    </div>

    <div class="video-container">
        <video class="input_video" autoplay playsinline></video>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="hud" class="hidden">
        <div class="panel">
            <div class="stat">Hands Detected: <span class="val" id="ui-hands">0</span></div>
            <div class="stat">FPS: <span class="val" id="ui-fps">0</span></div>
        </div>
        <div class="panel">
            <div class="stat">Gesture: <span class="val" id="ui-gesture">None</span></div>
            <div class="stat">Spread: <span class="val" id="ui-spread">0%</span></div>
        </div>
    </div>

<script>
const videoElement = document.querySelector('.input_video');
const mainCanvas = document.getElementById('mainCanvas');
const ctx = mainCanvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;
let time = 0;
let lastTime = performance.now();
let framesThisSecond = 0;
let lastFpsTime = performance.now();

let currentHands = [];
let particles = [];
let ripples = [];

const FINGER_TIPS = [4, 8, 12, 16, 20];
const WHITE = 'rgba(255,255,255,1)';

const uiHands   = document.getElementById('ui-hands');
const uiFps     = document.getElementById('ui-fps');
const uiGesture = document.getElementById('ui-gesture');
const uiSpread  = document.getElementById('ui-spread');

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    mainCanvas.width  = width;
    mainCanvas.height = height;
}
window.addEventListener('resize', resize);
resize();

document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    initMediaPipe();
    requestAnimationFrame(renderLoop);
});

// ── Helpers ──────────────────────────────────────────────────────────────────
function getDist(p1, p2) {
    return Math.hypot(p1.x - p2.x, p1.y - p2.y);
}

function mapToCanvas(point) {
    return { x: point.x * width, y: point.y * height };
}

// ── Gesture Detection ─────────────────────────────────────────────────────────
let lastPinchState = [false, false];

function detectGestures() {
    if (!currentHands.length) return;

    currentHands.forEach((hand, idx) => {
        const thumb = hand[4];
        const index = hand[8];
        const dist  = getDist(thumb, index);
        const isPinching = dist < 0.05;

        if (isPinching && !lastPinchState[idx]) {
            const mid = {
                x: (thumb.x + index.x) / 2,
                y: (thumb.y + index.y) / 2
            };
            createShockwave(mapToCanvas(mid));
            uiGesture.innerText = 'PINCH !';
        }
        lastPinchState[idx] = isPinching;
    });

    if (currentHands[0]) {
        const spread = getDist(currentHands[0][8], currentHands[0][20]);
        const spreadPct = Math.min(Math.round(spread * 300), 100);
        uiSpread.innerText = spreadPct + '%';
        if (!lastPinchState.includes(true)) {
            uiGesture.innerText = spreadPct > 50 ? 'Open Hand' : 'Fist';
        }
    }
}

// ── Effects ───────────────────────────────────────────────────────────────────
function createParticles(pos, count = 3) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: pos.x, y: pos.y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 1.0,
            size: Math.random() * 3 + 1
        });
    }
}

function createShockwave(pos) {
    ripples.push({
        x: pos.x, y: pos.y,
        radius: 0,
        maxRadius: 150 + Math.random() * 100,
        life: 1.0
    });
}

function updatePhysics() {
    // Particles removed
// Ripples / shockwaves
    for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];
        r.radius += (r.maxRadius - r.radius) * 0.1;
        r.life -= 0.03;

        if (r.life <= 0) { ripples.splice(i, 1); continue; }

        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        ctx.strokeStyle = WHITE;
        ctx.lineWidth = 4 * r.life;
        ctx.globalAlpha = r.life;
        ctx.stroke();
    }

    ctx.globalAlpha = 1.0;
}

// ── Render Loop ───────────────────────────────────────────────────────────────
function renderLoop(timestamp) {
    requestAnimationFrame(renderLoop);

    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    time += dt;

    // FPS counter
    framesThisSecond++;
    if (timestamp > lastFpsTime + 1000) {
        uiFps.innerText = framesThisSecond;
        framesThisSecond = 0;
        lastFpsTime = timestamp;
    }

    // Fade previous frame (motion trail)
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(0, 0, width, height);
    ctx.globalCompositeOperation = 'source-over';

    updatePhysics();

    if (currentHands.length > 0) {

        // Draw skeleton (white)
        currentHands.forEach((hand) => {
            drawConnectors(ctx, hand, HAND_CONNECTIONS, {
                color: 'rgba(255,255,255,0.7)',
                lineWidth: 2
            });

            // Fingertip dots + sparks
            ctx.shadowBlur = 12;
            ctx.shadowColor = WHITE;

            FINGER_TIPS.forEach((tipIdx) => {
                const pt = mapToCanvas(hand[tipIdx]);
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = WHITE;
                ctx.fill();

                // Sprinkle/particle effect removed
            });

            ctx.shadowBlur = 0;
        });

        // Cross-hand lines (white) when 2 hands visible
        if (currentHands.length >= 2) {
            const h1 = currentHands[0];
            const h2 = currentHands[1];

            FINGER_TIPS.forEach((tipIdx) => {
                const pt1 = mapToCanvas(h1[tipIdx]);
                const pt2 = mapToCanvas(h2[tipIdx]);
                const dist = getDist(pt1, pt2);

                // Lightning arc when close
                if (dist < 150 && Math.random() > 0.5) {
                    const midX = (pt1.x + pt2.x) / 2 + (Math.random() - 0.5) * 50;
                    const midY = (pt1.y + pt2.y) / 2 + (Math.random() - 0.5) * 50;
                    ctx.beginPath();
                    ctx.moveTo(pt1.x, pt1.y);
                    ctx.lineTo(midX, midY);
                    ctx.lineTo(pt2.x, pt2.y);
                    ctx.strokeStyle = WHITE;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = WHITE;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                // Steady connecting line
                ctx.beginPath();
                ctx.moveTo(pt1.x, pt1.y);
                ctx.lineTo(pt2.x, pt2.y);
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 8;
                ctx.shadowColor = WHITE;
                ctx.stroke();
                ctx.shadowBlur = 0;
            });

            // Mandala — star connections between all 10 tips
            const allTips = [
                ...FINGER_TIPS.map(t => mapToCanvas(h1[t])),
                ...FINGER_TIPS.map(t => mapToCanvas(h2[t]))
            ];
            const cx = allTips.reduce((s, p) => s + p.x, 0) / allTips.length;
            const cy = allTips.reduce((s, p) => s + p.y, 0) / allTips.length;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(time * 0.5);
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const t1 = { x: allTips[i].x - cx, y: allTips[i].y - cy };
                const t2 = { x: allTips[(i + 3) % 10].x - cx, y: allTips[(i + 3) % 10].y - cy };
                ctx.moveTo(t1.x, t1.y);
                ctx.lineTo(t2.x, t2.y);
            }
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }

        detectGestures();
    }
}

// ── MediaPipe ─────────────────────────────────────────────────────────────────
function initMediaPipe() {
    const hands = new Hands({ locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
        uiHands.innerText = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
        currentHands = results.multiHandLandmarks || [];
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width: 1280,
        height: 720,
        facingMode: 'user'
    });

    camera.start();
}
</script>
</body>
</html>
